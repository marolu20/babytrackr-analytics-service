spring:
  config:
    import: "optional:file:.env[.properties]" # loads the .env file
  application:
    name: babytrackr-analytics-service
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${DB_URL}
    username: ${DB_MAIN_USERNAME}
    password: ${DB_MAIN_PASSWORD}
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update

server:
  port: 8081
babytrackr:
  kafka:
    bootstrap-servers: localhost:9092
    topics:
      baby-events: baby-events
